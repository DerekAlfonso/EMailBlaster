name: Release

# Pushing a tag like v1.2.3 builds all shippable apps and attaches them to a GitHub Release.
#
# Each app ships in two flavors:
#   *-self-contained-*      bundles the .NET runtime; larger download, no prerequisites.
#   *-framework-dependent-* much smaller, but requires the .NET 8 runtime to be installed.
on:
  push:
    tags:
      - "v*"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish apps (win-x64, both flavors)
        shell: pwsh
        run: |
          foreach ($app in 'Desktop', 'Cli', 'Web') {
            foreach ($flavor in 'self-contained', 'framework-dependent') {
              $selfContained = if ($flavor -eq 'self-contained') { '--self-contained' } else { '--no-self-contained' }
              dotnet publish "src/EmailBlaster.$app/EmailBlaster.$app.csproj" `
                -c Release -r win-x64 $selfContained -p:PublishSingleFile=true -p:Version=$env:VERSION `
                -o "publish/EmailBlaster.$app-win-x64-$flavor"
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }

      - name: Zip artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Get-ChildItem publish -Directory | ForEach-Object {
            Compress-Archive -Path "$($_.FullName)\*" -DestinationPath "dist\$($_.Name)-v$env:VERSION.zip"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.zip
          if-no-files-found: error

  # Linux builds run on a Linux runner so the executable bit survives into the tar.gz.
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish apps (linux-x64, both flavors)
        run: |
          for app in Cli Web; do
            for flavor in self-contained framework-dependent; do
              if [ "$flavor" = "self-contained" ]; then sc="--self-contained"; else sc="--no-self-contained"; fi
              dotnet publish "src/EmailBlaster.$app/EmailBlaster.$app.csproj" \
                -c Release -r linux-x64 $sc -p:PublishSingleFile=true -p:Version=$VERSION \
                -o "publish/EmailBlaster.$app-linux-x64-$flavor"
            done
          done

      - name: Tar artifacts
        run: |
          mkdir dist
          for d in publish/*/; do
            name=$(basename "$d")
            tar -C "$d" -czf "dist/$name-v$VERSION.tar.gz" .
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Choosing a download

            | Flavor | Prerequisites | Size |
            | --- | --- | --- |
            | `self-contained` | None. The .NET runtime is bundled. | Larger |
            | `framework-dependent` | Requires .NET 8 installed: the [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) for the Desktop app, the ASP.NET Core 8 Runtime for the Web app, and the base .NET 8 Runtime for the CLI. | Much smaller |

            If you are unsure, pick `self-contained`.
